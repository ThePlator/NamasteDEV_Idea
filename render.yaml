services:
  - type: web
    name: orbit-cicd-demo
    env: node
    plan: free
    buildCommand: npm install --omit=dev
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "3000"
      - key: SERVER_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GITHUB_SECRET
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
